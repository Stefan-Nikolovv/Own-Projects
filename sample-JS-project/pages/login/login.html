<section class="page login-page">
  <div class="login-card">
    <p class="login-eyebrow">Emotion in Motion</p>
    <h1 class="login-title">Admin Login</h1>
    <p class="login-subtitle">Sign in to manage bookings and view client details.</p>

    <form id="loginForm" class="login-form" novalidate>
      <div class="dialog-field">
        <label for="loginEmail">Email</label>
        <input id="loginEmail" type="email" autocomplete="email" placeholder="your@email.com" />
      </div>

      <div class="dialog-field">
        <label for="loginPassword">Password</label>
        <input id="loginPassword" type="password" autocomplete="current-password" placeholder="Password" />
      </div>

      <p id="loginError" class="dialog-message error hidden"></p>

      <button id="loginBtn" type="submit" class="save-spot-btn" style="width:100%;margin-top:8px;">
        Log in
      </button>
    </form>
  </div>
</section>
