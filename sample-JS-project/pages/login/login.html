<section class="page login-page">
  <div class="login-card">
    <p class="login-eyebrow">Emotion in Motion</p>
    <h1 class="login-title" data-i18n="login_title">Admin Login</h1>
    <p class="login-subtitle" data-i18n="login_subtitle">Sign in to manage bookings and view client details.</p>

    <form id="loginForm" class="login-form" novalidate>
      <div class="dialog-field">
        <label for="loginEmail" data-i18n="login_email_label">Email</label>
        <input id="loginEmail" type="email" autocomplete="email" data-i18n-placeholder="login_email_placeholder" placeholder="your@email.com" />
      </div>

      <div class="dialog-field">
        <label for="loginPassword" data-i18n="login_password_label">Password</label>
        <input id="loginPassword" type="password" autocomplete="current-password" data-i18n-placeholder="login_password_placeholder" placeholder="Password" />
      </div>

      <p id="loginError" class="dialog-message error hidden"></p>

      <button id="loginBtn" type="submit" class="save-spot-btn" style="width:100%;margin-top:8px;">
        <span data-i18n="login_button">Log in</span>
      </button>
    </form>
  </div>
</section>
