<section class="page schedule-page">
    <div class="schedule-header">
        <div>
            <p class="schedule-eyebrow" data-i18n="home_subtitle">Personal Training</p>
            <h1 data-i18n="schedule_title">Weekly Schedule</h1>
            <p class="schedule-subtitle" data-i18n="schedule_subtitle">
                Choose a slot and save your spot.
            </p>
        </div>
        <div id="weekNavControls" class="week-nav-controls"></div>
    </div>

    <div id="weekGrid" class="week-grid"></div>

    <div id="slotSpinner" class="slot-spinner hidden">
        <div class="spinner-circle"></div>
    </div>

    <dialog id="slotDialog" class="slot-dialog">
        <form method="dialog" class="dialog-shell">
            <button class="dialog-close" id="closeDialogBtn" type="submit">×</button>

            <p id="dialogDay" class="dialog-day"></p>
            <h2 id="dialogTime" class="dialog-time"></h2>
            <p id="dialogSpots" class="dialog-spots"></p>

            <div class="dialog-field">
                <label for="clientName" data-i18n="dialog_name_label">Your name</label>
                <input id="clientName" type="text" data-i18n-placeholder="dialog_name_label" placeholder="Your name" />
            </div>

            <div class="dialog-field">
                <label for="clientPhone" data-i18n="dialog_phone_label">Phone number</label>
                <input id="clientPhone" type="text" data-i18n-placeholder="dialog_phone_label"
                    placeholder="Phone number" />
            </div>

            <p id="dialogMessage" class="dialog-message hidden"></p>

            <button id="saveSpotBtn" type="button" class="save-spot-btn" data-i18n="dialog_save">
                Save your spot
            </button>

            <button id="cancelEditBtn" type="button" class="cancel-edit-btn hidden" data-i18n="dialog_cancel_edit">
                Cancel edit
            </button>

            <div class="saved-list-wrap">
                <h3 data-i18n="dialog_saved_names">Saved names</h3>
                <ul id="savedNamesList" class="saved-names-list"></ul>
            </div>
        </form>
    </dialog>

    <dialog id="removeConfirmDialog" class="confirm-dialog">
        <div class="confirm-dialog-shell">
            <p class="confirm-dialog-eyebrow" data-i18n="remove_eyebrow">Remove booking</p>
            <h3 id="removeConfirmTitle" class="confirm-dialog-title" data-i18n="remove_question">
                Are you sure?
            </h3>
            <p id="removeConfirmText" class="confirm-dialog-text" data-i18n="remove_text">
                This booking will be removed from the selected slot.
            </p>

            <div class="confirm-dialog-actions">
                <button id="cancelRemoveBtn" type="button" class="confirm-cancel-btn" data-i18n="remove_keep">
                    Keep booking
                </button>
                <button id="confirmRemoveBtn" type="button" class="confirm-remove-btn" data-i18n="remove_btn">
                    Remove
                </button>
            </div>
        </div>
    </dialog>
</section>
